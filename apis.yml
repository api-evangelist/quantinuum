apis:
  - aid: quantinuum:nexus
    name: Quantinuum Nexus
    description: >-
      Nexus is Quantinuum's all-in-one quantum computing cloud platform. It
      brokers access to Quantinuum H-Series hardware (H1, H2, Helios) and to
      partner backends including IBM Quantum and Amazon Braket, manages
      projects, teams, roles, quotas, credentials, and linked accounts, and
      orchestrates job submission, compilation, results retrieval, and circuit
      visualization. Nexus exposes a Python client (`qnexus`, Apache 2.0) and a
      REST/OpenAPI surface ("Nexus OpenAPI") covered by the platform's
      Authentication & Quotas documentation. Jobs are submitted as OpenQASM 2.0
      or QIR programs and may be compiled and executed against Quantinuum
      systems or partner backends.
    humanURL: https://docs.quantinuum.com/nexus/
    tags:
      - Quantum Computing
      - Cloud Platform
      - Job Submission
      - Compilation
      - Projects
      - Teams
      - Quotas
    properties:
      - type: Documentation
        url: https://docs.quantinuum.com/nexus/
      - type: Documentation
        url: https://docs.quantinuum.com/nexus/trainings/getting_started.html
      - type: Signup
        url: https://nexus.quantinuum.com/auth/login
      - type: SDKs
        url: https://github.com/Quantinuum/qnexus
      - type: SDKs
        url: https://pypi.org/project/qnexus/
  - aid: quantinuum:systems
    name: Quantinuum Systems (H-Series)
    description: >-
      The Quantinuum Systems API exposes the H-Series trapped-ion (QCCD)
      quantum computers — System Model H1, System Model H2, and the
      next-generation Helios — for circuit submission. Direct communication
      with system endpoints occurs via QIR (Quantum Intermediate
      Representation) or OpenQASM 2.0 payloads, typically brokered through
      Nexus. The H-Series supports all-to-all qubit connectivity, mid-circuit
      measurement and reset, parameterized two-qubit operations, and
      conditional logic.
    humanURL: https://docs.quantinuum.com/systems/
    tags:
      - Quantum Computing
      - Trapped Ion
      - QIR
      - OpenQASM
      - H-Series
    properties:
      - type: Documentation
        url: https://docs.quantinuum.com/systems/
      - type: Documentation
        url: https://docs.quantinuum.com/systems/user_guide/hardware_user_guide/access.html
      - type: Data
        url: https://github.com/Quantinuum/quantinuum-hardware-specifications
      - type: Data
        url: https://github.com/Quantinuum/quantinuum-hardware-quantum-volume
      - type: Data
        url: https://github.com/Quantinuum/quantinuum-hardware-h2-benchmark
  - aid: quantinuum:tket
    name: TKET
    description: >-
      TKET is Quantinuum's optimizing quantum compiler. The Python interface
      `pytket` and the C++ core `tket` provide gate-level circuit construction,
      hardware-agnostic optimization passes, routing, and backend extensions
      for Quantinuum H-Series, IBM Q (Qiskit), Amazon Braket, IQM, AQT,
      PennyLane, and others. TKET2 (Rust) is the next-generation compiler
      built on the HUGR intermediate representation.
    humanURL: https://docs.quantinuum.com/tket/
    tags:
      - Quantum Compiler
      - Circuit Optimization
      - Python SDK
      - HUGR
    properties:
      - type: Documentation
        url: https://docs.quantinuum.com/tket/user-guide/
      - type: SDKs
        url: https://github.com/Quantinuum/tket
      - type: SDKs
        url: https://github.com/Quantinuum/tket2
      - type: SDKs
        url: https://github.com/Quantinuum/pytket-quantinuum
      - type: SDKs
        url: https://pypi.org/project/pytket/
      - type: CodeExamples
        url: https://github.com/Quantinuum/pytket-docs
  - aid: quantinuum:inquanto
    name: InQuanto
    description: >-
      InQuanto is Quantinuum's computational quantum chemistry platform for
      molecular and materials simulations on near-term and fault-tolerant
      quantum computers. It implements VQE, quantum phase estimation, and
      advanced ansätze/error-mitigation, with integrations to PySCF and other
      classical chemistry tooling. Licensed to enterprise users and accessed
      via Python; runs against Quantinuum Systems and emulators through Nexus.
    humanURL: https://docs.quantinuum.com/inquanto/
    tags:
      - Quantum Chemistry
      - Molecular Simulation
      - VQE
      - QPE
    properties:
      - type: Documentation
        url: https://docs.quantinuum.com/inquanto/manual/howto.html
      - type: Portal
        url: https://www.quantinuum.com/products-solutions/inquanto
  - aid: quantinuum:lambeq
    name: lambeq
    description: >-
      lambeq is Quantinuum's open-source Python toolkit for Quantum Natural
      Language Processing (QNLP). It converts sentences into string diagrams
      (DisCoCat / DisCoCirc), rewrites them into parameterized quantum
      circuits, and trains them on classical simulators or Quantinuum
      hardware. Released under Apache 2.0.
    humanURL: https://docs.quantinuum.com/lambeq/
    tags:
      - Quantum NLP
      - QNLP
      - DisCoCat
      - Python SDK
    properties:
      - type: Documentation
        url: https://docs.quantinuum.com/lambeq/intro.html
      - type: SDKs
        url: https://github.com/CQCL/lambeq
      - type: SDKs
        url: https://github.com/Quantinuum/lambeq
      - type: SDKs
        url: https://pypi.org/project/lambeq/
  - aid: quantinuum:guppy
    name: Guppy
    description: >-
      Guppy (`guppylang`) is Quantinuum's Pythonic quantum-classical
      programming language. Guppy programs compile through the HUGR
      hierarchical intermediate representation and target Quantinuum hardware,
      Selene emulators, and QIR-compatible backends. Designed for hybrid
      classical-quantum control flow including conditional logic, loops,
      and mid-circuit measurement.
    humanURL: https://docs.quantinuum.com/guppy/
    tags:
      - Quantum Programming Language
      - Hybrid Computation
      - HUGR
      - Python
    properties:
      - type: Documentation
        url: https://docs.quantinuum.com/guppy/getting_started.html
      - type: SDKs
        url: https://github.com/Quantinuum/guppylang
      - type: SDKs
        url: https://github.com/Quantinuum/hugr
  - aid: quantinuum:selene
    name: Selene
    description: >-
      Selene is Quantinuum's plugin-extensible emulator for hybrid quantum
      computation. It simulates the behavior of Quantinuum H-Series hardware
      including mid-circuit measurement, conditional control flow, and
      QIR-defined programs, with pluggable noise models and runtime backends.
    humanURL: https://docs.quantinuum.com/selene/
    tags:
      - Emulator
      - Simulation
      - Hybrid Computation
      - QIR
    properties:
      - type: Documentation
        url: https://docs.quantinuum.com/selene/user_guide/overview.html
      - type: SDKs
        url: https://github.com/Quantinuum/selene
  - aid: quantinuum:quantum-origin
    name: Quantum Origin
    description: >-
      Quantum Origin is Quantinuum's verifiable quantum random number
      generation service, delivering cryptographically strong entropy seeded
      by quantum measurements for use in PKI, key generation, and other
      security workloads. Available as a hosted cloud API and on-prem
      appliance.
    humanURL: https://docs.quantinuum.com/origin/
    tags:
      - Quantum Random Number Generator
      - QRNG
      - Cryptography
      - Security
    properties:
      - type: Documentation
        url: https://docs.quantinuum.com/origin/user_guides/introduction/summary.html
      - type: Portal
        url: https://www.quantinuum.com/products-solutions/quantum-origin
  - aid: quantinuum:qermit
    name: Qermit
    description: >-
      Qermit is a Python module for running error-mitigation protocols
      (probabilistic error cancellation, zero-noise extrapolation,
      Clifford data regression, dynamical decoupling, etc.) on top of the
      pytket quantum SDK and Quantinuum/partner backends.
    humanURL: https://github.com/Quantinuum/Qermit
    tags:
      - Error Mitigation
      - Python SDK
      - pytket
    properties:
      - type: SDKs
        url: https://github.com/Quantinuum/Qermit
      - type: SDKs
        url: https://pypi.org/project/qermit/
