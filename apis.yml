aid: quantinuum
name: Quantinuum
description: >-
  Quantinuum is an integrated quantum computing company formed by the 2021
  merger of Honeywell Quantum Solutions and Cambridge Quantum. It builds
  trapped-ion (QCCD) quantum computers — the H1, H2, and Helios System Models —
  and develops the full software stack that runs on them: the Nexus cloud
  platform, the TKET quantum compiler, the InQuanto computational chemistry
  package, the lambeq quantum natural language processing toolkit, the Guppy
  quantum programming language, the Selene emulation framework, and the Quantum
  Origin verifiable randomness service. Programmatic access to Quantinuum
  systems is delivered through the Nexus platform (Python client `qnexus` plus a
  REST/OpenAPI surface) and via partner clouds; circuits are described in
  OpenQASM 2.0 and the Quantum Intermediate Representation (QIR).
type: Index
position: Producing
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
